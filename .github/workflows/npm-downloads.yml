name: SDK Health Check

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

jobs:
  check:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install kibo-sdk
        run: npm install kibo-sdk --prefer-online 2>/dev/null || true
        shell: bash
